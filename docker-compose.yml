version: "3.8"

services:

  mysql:
    container_name: mysql
    image: mysql:5.7
    restart: always

    env_file:
      - .env

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql-vol:/var/lib/mysql

    networks:
      - two-tier-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  flask-app:
    container_name: flask-container
    image: trainwithshubham/two-tier-flask-app:latest
    restart: always

    ports:
      - "${FLASK_PORT}:5000"

    networks:
      - two-tier-network

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    networks:
      - two-tier-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - two-tier-network
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - two-tier-network


  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - two-tier-network

volumes:
  mysql-vol:


networks:
  two-tier-network:
    driver: bridge
