version: "3.8"

services:

  mysql:
    container_name: mysql
    image: mysql:5.7
    restart: always

    env_file:
      - .env

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql-vol:/var/lib/mysql

    networks:
      - two-tier-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  flask-app:
    container_name: flask-container
    image: trainwithshubham/two-tier-flask-app:latest
    restart: always

    ports:
      - "${FLASK_PORT}:5000"

    networks:
      - two-tier-network

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  mysql-vol:


networks:
  two-tier-network:
    driver: bridge
